version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: orchestrator-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: orchestrator
    volumes:
      - mongo_data:/data/db

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchestrator-api
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/orchestrator
      KAFKA_BROKER: host.docker.internal:9092
      DB_NAME: orchestrator
      PORT: 8080
    depends_on:
      - mongo
    restart: unless-stopped

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchestrator-worker
    command: ./worker
    environment:
      MONGO_URI: mongodb://mongo:27017/orchestrator
      KAFKA_BROKER: host.docker.internal:9092
      DB_NAME: orchestrator
    depends_on:
      - mongo
    restart: unless-stopped

  scheduler:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchestrator-scheduler
    command: ./scheduler
    environment:
      MONGO_URI: mongodb://mongo:27017/orchestrator
      KAFKA_BROKER: host.docker.internal:9092
      DB_NAME: orchestrator
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data: